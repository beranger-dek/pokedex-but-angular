
@if (appService.pokemon.isLoading()) {
    <app-loader></app-loader>

} @else {
    <p>Nom : {{appService.pokemon.value()!.name}}</p>
    <p>Poids : {{appService.pokemon.value()!.weight | convert_to: 0.1 : 'kg'}}</p>
    <p>Taille : {{appService.pokemon.value()!.height |convert_to: 0.1 : 'cm'}}</p>
}
